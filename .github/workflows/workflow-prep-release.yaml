name: Pre-tag release prep
concurrency:
  group: workflow-prep-release-${{ github.event.inputs.version }}
  cancel-in-progress: false
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (X.Y.Z, e.g. 4.3.30)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write   # needed for `gh workflow run` to dispatch build.yml

jobs:
  prep:
    runs-on: ubuntu-24.04   # pinned: man2html output is version-sensitive (see #52)
    steps:
      - name: Validate version
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$VERSION'. Expected X.Y.Z" >&2
            exit 1
          fi
#---------------------------------------------------
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
#---------------------------------------------------
      - name: Reject if release tag already exists
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          # checkout@v6 fetches tags with fetch-depth: 0, so this is authoritative.
          if git rev-parse --verify --quiet "refs/tags/rel-$VERSION" >/dev/null; then
            echo "Tag rel-$VERSION already exists; refusing to prep an already-released version." >&2
            exit 1
          fi
#---------------------------------------------------
      - name: Install man2html
        run: |
          sudo apt-get update
          sudo apt-get install -y man2html
#---------------------------------------------------
      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
#---------------------------------------------------
      - name: Reset release branch from main HEAD
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          # Always recreate release/$VERSION from the current main HEAD so reruns
          # are clean replacements, never regenerated on top of older state.
          git checkout -B "release/$VERSION"
#---------------------------------------------------
      - name: Run dorelease.sh with SOURCE_DATE_EPOCH
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          # Author date of HEAD is stable across amend/rebase; committer date isn't.
          SOURCE_DATE_EPOCH="$(git log -1 --format=%at HEAD)"
          export SOURCE_DATE_EPOCH
          ./build/dorelease.sh "$VERSION"
#---------------------------------------------------
      - name: Commit prep tree
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "dorelease.sh produced no changes — nothing to commit." >&2
            exit 1
          fi
          git commit -m "Prep release $VERSION"
#---------------------------------------------------
      - name: Force-push release branch
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          git push --force origin "release/$VERSION"
#---------------------------------------------------
      - name: Open or update pull request
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          BRANCH="release/$VERSION"
          # gh pr view <branch> also matches closed PRs; gate on open ones only,
          # otherwise a rerun after a closed prep PR would leave the branch
          # with no open PR at all.
          if [ -n "$(gh pr list --head "$BRANCH" --base main --state open --json number -q '.[0].number // empty')" ]; then
            echo "PR already open for $BRANCH; force-push has updated it."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Prep release $VERSION" \
              --body "Auto-generated by \`workflow-prep-release.yaml\`. Merging this PR and tagging \`rel-$VERSION\` triggers the release tarball workflow."
          fi
#---------------------------------------------------
      - name: Dispatch build workflow on prep branch
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          # push/pull_request events from GITHUB_TOKEN do NOT trigger workflows,
          # but workflow_dispatch does — explicitly run build.yml on the prep branch
          # so the PR's checks tab is populated.
          gh workflow run build.yml --ref "release/$VERSION"
#---------------------------------------------------
      - name: Write next steps to run summary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          BRANCH="release/$VERSION"
          PR_URL="$(gh pr list --head "$BRANCH" --base main --state open --json url -q '.[0].url // empty')"
          cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          ## Release prep for $VERSION

          - Prep branch: \`$BRANCH\` (recreated from \`main\` @ $(git rev-parse --short main))
          - Pull request: $PR_URL
          - Build checks were dispatched on the prep branch and will show up on the PR.

          ### Next steps

          1. Review and merge the pull request.
          2. Tag the PR's merge commit and push the tag — this triggers the tarball
             release workflow. (Tag the merge commit, not \`origin/main\`, so the
             release can't scoop up commits that landed after the merge.)

             \`\`\`
             git fetch origin
             git tag rel-$VERSION "\$(gh pr view $PR_URL --json mergeCommit -q .mergeCommit.oid)"
             git push origin rel-$VERSION
             \`\`\`

          3. The release is created as a **draft** — review the notes, then publish it.
          EOF
