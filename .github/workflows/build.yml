name: build

on:
  push:
  pull_request:

# This workflow checks out and runs pull-request code; the token needs
# nothing beyond reading the repo.
permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    # A regression test that blocks (e.g. a configure probe growing an
    # interactive prompt) would otherwise hang the job for the runner's
    # 6-hour ceiling. Build + suite take ~1 minute; 15 is generous.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            variant: server

          - name: client, CT=client
            variant: client
            conftype: client

          - name: client CT=server
            variant: client
            conftype: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libc-ares-dev \
            libldap-dev \
            libpcre2-dev \
            librrd-dev \
            libssl-dev \
            libtirpc-dev

      - name: Configure (${{ matrix.name }})
        env:
          CONFTYPE: ${{ matrix.conftype }}
        run: |
          USEXYMONPING=y \
          ENABLESSL=y \
          ENABLELDAP=y \
          ENABLELDAPSSL=y \
          XYMONUSER=xymon \
          XYMONTOPDIR=/usr/lib/xymon \
          XYMONVAR=/var/lib/xymon \
          XYMONHOSTURL=/xymon \
          CGIDIR=/usr/lib/xymon/cgi-bin \
          XYMONCGIURL=/xymon-cgi \
          SECURECGIDIR=/usr/lib/xymon/cgi-secure \
          SECUREXYMONCGIURL=/xymon-seccgi \
          HTTPDGID=www-data \
          XYMONLOGDIR=/var/log/xymon \
          XYMONHOSTNAME=localhost \
          XYMONHOSTIP=127.0.0.1 \
          MANROOT=/usr/share/man \
          INSTALLBINDIR=/usr/lib/xymon/server/bin \
          INSTALLETCDIR=/etc/xymon \
          INSTALLWEBDIR=/etc/xymon/web \
          INSTALLEXTDIR=/usr/lib/xymon/server/ext \
          INSTALLTMPDIR=/var/lib/xymon/tmp \
          INSTALLWWWDIR=/var/lib/xymon/www \
          ./configure --${{ matrix.variant }}

      - name: Build
        run: |
          echo "running make with $(nproc) parallel processes"
          make -j$(nproc)

      # Run the regression suite against the binaries this variant just built.
      # XYMON_VARIANT scopes the suite (need_variant in tests/lib/assert.sh):
      # the server leg runs server + shared tests; the client legs run client +
      # shared tests and skip server-only checks (configure --server, RRD,
      # xymonnet, web CGI). require_bin tests therefore execute here against the
      # real build for their variant -- e.g. tests/server/xymongrep-filter.sh
      # drives the common/xymongrep each leg builds -- instead of skipping. This
      # is the only place in CI those binary tests run; the separate no-build
      # lane (tests.yml) covers only the source-reading tests, but does so
      # independently of the build so they stay visible when the build is red.
      - name: Run regression tests against the build
        env:
          # CONFTYPE=client builds LOCALCLIENT=yes (configure.client), i.e. the
          # localclient variant -- scope the suite to it. Otherwise the build
          # variant (server | client) is the test scope.
          XYMON_VARIANT: ${{ matrix.conftype == 'client' && 'localclient' || matrix.variant }}
        run: |
          # This leg builds the full source for its variant, so every applicable
          # test finds the code/binaries it guards. The runner's all-skip exit
          # 77 ("nothing verified") can therefore only mean broken discovery,
          # not a legitimate skip -- map it to a hard failure. Actions has no
          # neutral state, so 77 would otherwise surface as a bare nonzero
          # failure with no explanation. `|| rc=$?` exempts the runner from
          # bash -e so the mapping is reachable.
          rc=0
          ./tests/testsuite || rc=$?
          if [ "$rc" = 77 ]; then
            echo "::error::testsuite skipped everything (rc=77) -- with full source built this means broken discovery, not a legitimate skip"
            exit 1
          fi
          exit "$rc"
